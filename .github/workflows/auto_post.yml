name: IMA検定 自動投稿（日次7時・12時）

on:
  schedule:
    # UTC計算(JST-9時間): JST 07:00 -> UTC 22:00, JST 12:00 -> UTC 03:00
    # GitHub Actionsは数分遅延するため、22:01, 03:01 に仕掛ける
    - cron: '1 3,22 * * *'
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  auto-post:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 実行環境の診断
        run: |
          echo "==== 環境チェック ===="
          echo "時刻 (UTC): $(date)"
          echo "Python version: $(python --version)"
          if [ -z "${{ secrets.X_API_KEY }}" ]; then echo "❌ X_API_KEY が設定されていません"; else echo "✅ X_API_KEY は設定されています"; fi
          if [ -z "${{ secrets.X_ACCESS_TOKEN }}" ]; then echo "❌ X_ACCESS_TOKEN が設定されていません"; else echo "✅ X_ACCESS_TOKEN は設定されています"; fi
          echo "========================"

      - name: 依存ライブラリをインストール
        run: pip install -r requirements.txt

      - name: 自動投稿スクリプトを実行
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          python github_auto_post.py

      - name: 投稿履歴（post_data.json）の更新を保存
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git pull origin main --rebase
          git add post_data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto: Update post_data.json to mark as posted" && git push origin main)
