name: IMA検定 自動投稿（日次7時・12時）

on:
  schedule:
    # UTC計算(JST-9時間): JST 07:00 -> UTC 22:00, JST 12:00 -> UTC 03:00
    # GitHub Actionsは数分遅延するため、22:01, 03:01 に仕掛ける
    - cron: '1 3,22 * * *'
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  auto-post:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 実行環境の診断とログ記録
        run: |
          echo "==== 最終実行ログ ($(date +'%Y-%m-%d %H:%M:%S' -d "+9 hours") JST) ====" > github_action_status.txt
          echo "時刻 (UTC): $(date)" >> github_action_status.txt
          if [ -z "${{ secrets.X_API_KEY }}" ]; then echo "❌ X_API_KEY: 未設定 (これが原因の可能性大)" >> github_action_status.txt; else echo "✅ X_API_KEY: 設定済み" >> github_action_status.txt; fi
          if [ -z "${{ secrets.X_ACCESS_TOKEN }}" ]; then echo "❌ X_ACCESS_TOKEN: 未設定" >> github_action_status.txt; else echo "✅ X_ACCESS_TOKEN: 設定済み" >> github_action_status.txt; fi
          echo "========================" >> github_action_status.txt

      - name: 依存ライブラリをインストール
        run: pip install -r requirements.txt

      - name: 自動投稿スクリプトを実行
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          python github_auto_post.py >> github_action_status.txt 2>&1

      - name: ログと実行結果を保存
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git pull origin main --rebase
          git add post_data.json github_action_status.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto: Update post status and logs" && git push origin main)
